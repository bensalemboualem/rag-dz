<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ithy Research - IA Factory</title>
    <link rel="stylesheet" href="iafactory-theme.css">
    <style>
        .ithy-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .ithy-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .ithy-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ithy-header .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .query-section {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .query-input {
            width: 100%;
            min-height: 120px;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .query-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #333;
        }

        .control-group select {
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .status-bar {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .status-bar.querying {
            border-left-color: #ffc107;
        }

        .status-bar.aggregating {
            border-left-color: #17a2b8;
        }

        .status-bar.complete {
            border-left-color: #28a745;
        }

        .reference-responses {
            margin-bottom: 2rem;
        }

        .reference-responses h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .reference-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .reference-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem;
            transition: border-color 0.3s;
        }

        .reference-card.loading {
            opacity: 0.5;
            border-color: #ffc107;
        }

        .reference-card.complete {
            border-color: #28a745;
        }

        .reference-card .model-name {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .reference-card .response-text {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
        }

        .final-response {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .final-response h3 {
            margin-bottom: 1rem;
            color: #333;
            font-size: 1.5rem;
        }

        .final-response .response-content {
            line-height: 1.8;
            color: #333;
            font-size: 1.05rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .model-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="ithy-container">
        <div class="ithy-header">
            <h1>🔬 Ithy Research Assistant</h1>
            <p class="subtitle">Mixture-of-Agents powered by IA Factory</p>
        </div>

        <div class="query-section">
            <textarea
                id="queryInput"
                class="query-input"
                placeholder="Posez votre question de recherche ici...&#10;&#10;Exemple : Quelles sont les meilleures pratiques pour créer une API REST en 2025 ?"
            ></textarea>

            <div class="controls">
                <div class="control-group">
                    <label for="aggregatorModel">Modèle Agrégateur</label>
                    <select id="aggregatorModel">
                        <option value="anthropic/claude-3-5-sonnet-20241022">Claude 3.5 Sonnet (recommandé)</option>
                        <option value="openai/gpt-4o">GPT-4o</option>
                        <option value="anthropic/claude-3-opus-20240229">Claude 3 Opus</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="temperature">Température</label>
                    <select id="temperature">
                        <option value="0.3">0.3 - Très précis</option>
                        <option value="0.5">0.5 - Équilibré</option>
                        <option value="0.7" selected>0.7 - Standard</option>
                        <option value="0.9">0.9 - Créatif</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="maxTokens">Longueur maximale</label>
                    <select id="maxTokens">
                        <option value="1024">Court (1024)</option>
                        <option value="2048" selected>Moyen (2048)</option>
                        <option value="4096">Long (4096)</option>
                    </select>
                </div>
            </div>

            <button id="submitBtn" class="submit-btn" onclick="executeQuery()">
                🚀 Lancer la recherche
            </button>
        </div>

        <div id="resultsSection" class="results-section">
            <div id="statusBar" class="status-bar">
                <span class="spinner"></span>
                <span id="statusText">Initialisation...</span>
            </div>

            <div class="reference-responses">
                <h3>📚 Réponses des modèles de référence</h3>
                <div id="referenceGrid" class="reference-grid">
                    <!-- Reference cards will be inserted here -->
                </div>
            </div>

            <div class="final-response">
                <h3>✨ Synthèse finale</h3>
                <div id="finalResponseContent" class="response-content">
                    <!-- Final response will be streamed here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8180/api/ithy';

        // Reference models used by default
        const referenceModels = [
            { id: 'openai/gpt-4o-mini', name: 'GPT-4o Mini' },
            { id: 'openai/gpt-3.5-turbo', name: 'GPT-3.5 Turbo' },
            { id: 'anthropic/claude-3-haiku-20240307', name: 'Claude 3 Haiku' },
            { id: 'anthropic/claude-3-sonnet-20240229', name: 'Claude 3 Sonnet' }
        ];

        function createReferenceCards() {
            const grid = document.getElementById('referenceGrid');
            grid.innerHTML = '';

            referenceModels.forEach((model, index) => {
                const card = document.createElement('div');
                card.className = 'reference-card loading';
                card.id = `ref-card-${index}`;
                card.innerHTML = `
                    <div class="model-name">${model.name}</div>
                    <div class="response-text" id="ref-response-${index}">
                        <span class="spinner"></span> Interrogation en cours...
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStatus(message, type = 'querying') {
            const statusBar = document.getElementById('statusBar');
            const statusText = document.getElementById('statusText');

            statusBar.className = `status-bar ${type}`;
            statusText.textContent = message;

            if (type === 'complete') {
                statusBar.querySelector('.spinner')?.remove();
            }
        }

        async function executeQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('Veuillez entrer une question de recherche');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const resultsSection = document.getElementById('resultsSection');

            // Disable button and show results section
            submitBtn.disabled = true;
            submitBtn.textContent = '🔄 Recherche en cours...';
            resultsSection.classList.add('active');

            // Create reference cards
            createReferenceCards();

            // Reset final response
            document.getElementById('finalResponseContent').innerHTML = '';

            const aggregatorModel = document.getElementById('aggregatorModel').value;
            const temperature = parseFloat(document.getElementById('temperature').value);
            const maxTokens = parseInt(document.getElementById('maxTokens').value);

            try {
                updateStatus(`Interrogation de ${referenceModels.length} modèles en parallèle...`, 'querying');

                // Call non-streaming API first to get reference responses
                const response = await fetch(`${API_BASE}/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query,
                        aggregator_model: aggregatorModel,
                        temperature,
                        max_tokens: maxTokens,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erreur ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                // Display reference responses
                data.reference_responses.forEach((ref, index) => {
                    const card = document.getElementById(`ref-card-${index}`);
                    const responseDiv = document.getElementById(`ref-response-${index}`);

                    if (card && responseDiv) {
                        card.classList.remove('loading');
                        card.classList.add('complete');
                        responseDiv.textContent = ref.response;
                    }
                });

                updateStatus('Synthèse des réponses...', 'aggregating');

                // Display final response
                setTimeout(() => {
                    document.getElementById('finalResponseContent').textContent = data.final_response;
                    updateStatus('✅ Recherche terminée avec succès', 'complete');

                    // Add model badges
                    const modelsUsed = data.models_used;
                    const finalSection = document.querySelector('.final-response');
                    const badgeContainer = document.createElement('div');
                    badgeContainer.style.marginBottom = '1rem';

                    const aggregatorBadge = document.createElement('span');
                    aggregatorBadge.className = 'model-badge';
                    aggregatorBadge.textContent = `Agrégateur: ${modelsUsed.aggregator}`;
                    badgeContainer.appendChild(aggregatorBadge);

                    finalSection.querySelector('h3').after(badgeContainer);

                    submitBtn.disabled = false;
                    submitBtn.textContent = '🚀 Lancer la recherche';
                }, 500);

            } catch (error) {
                console.error('Error:', error);
                updateStatus(`❌ Erreur: ${error.message}`, 'complete');
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Lancer la recherche';
            }
        }

        // Allow Ctrl+Enter to submit
        document.getElementById('queryInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                executeQuery();
            }
        });
    </script>
</body>
</html>
