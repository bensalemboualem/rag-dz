services:
  # PostgreSQL Database with PGVector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragdz-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragdz2024secure}
      POSTGRES_DB: ${POSTGRES_DB:-archon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/sql/pgvector_migration.sql:/docker-entrypoint-initdb.d/02-pgvector.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragdz-network
    command: postgres -c shared_preload_libraries=vector

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ragdz-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ragdz-network

  # PostgreSQL Exporter for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ragdz-postgres-exporter
    depends_on:
      - postgres
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ragdz2024secure}@postgres:5432/${POSTGRES_DB:-archon}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - ragdz-network
    restart: unless-stopped

  # Redis Exporter for Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ragdz-redis-exporter
    depends_on:
      - redis
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "9121:9121"
    networks:
      - ragdz-network
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragdz-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - ragdz-network

  # Backend API
  backend:
    build:
      context: ./backend/rag-compat
      dockerfile: Dockerfile
    container_name: ragdz-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      # Database
      POSTGRES_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-ragdz2024secure}@postgres:5432/${POSTGRES_DB:-archon}

      # Redis
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333

      # Cloud LLM (OpenAI/Anthropic/DeepSeek)
      ENABLE_LLM: ${ENABLE_LLM:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-sonnet-20241022}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}

      # Security
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}

      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      RATE_LIMIT_PER_HOUR: ${RATE_LIMIT_PER_HOUR:-1000}
      ENABLE_RATE_LIMITING: ${ENABLE_RATE_LIMITING:-true}

      # Embeddings
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}

      # Reranking (nouveau d'Archon)
      USE_RERANKING: ${USE_RERANKING:-true}
      RERANKING_MODEL: ${RERANKING_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANKING_TOP_K: ${RERANKING_TOP_K:-10}

      # PGVector (nouveau d'Archon)
      USE_PGVECTOR: ${USE_PGVECTOR:-true}

      # Service
      SERVICE_NAME: rag-dz-api
      SERVICE_VERSION: 1.0.0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}

      # Features
      ENABLE_CORS: ${ENABLE_CORS:-true}
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      ENABLE_API_KEY_AUTH: ${ENABLE_API_KEY_AUTH:-true}
    ports:
      - "8180:8180"
    volumes:
      - ./backend/rag-compat:/app  # Temporarily enabled for development
      - ./bmad:/bmad  # BMAD method for orchestration
      - backend_cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8180/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ragdz-network
    restart: unless-stopped

  # Frontend UI (Archon Original)
  frontend:
    build:
      context: ./frontend/archon-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8180}
    container_name: ragdz-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8180}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8180/ws}
      VITE_SHOW_DEVTOOLS: ${VITE_SHOW_DEVTOOLS:-true}
    ports:
      - "3737:3737"
    networks:
      - ragdz-network
    restart: unless-stopped

  # RAG-UI Simple (React 19 Interface)
  rag-ui:
    build:
      context: ./frontend/rag-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8180}
    container_name: ragdz-rag-ui
    depends_on:
      - backend
    environment:
      PORT: 5173
      REACT_APP_API_URL: ${VITE_API_URL:-http://localhost:8180}
    ports:
      - "5173:5173"
    networks:
      - ragdz-network
    restart: unless-stopped

  # Bolt.diy (AI Code Editor)
  bolt-diy:
    build:
      context: ./frontend/bolt-diy
      dockerfile: Dockerfile
    container_name: ragdz-bolt-diy
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8180}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "5174:5173"
    networks:
      - ragdz-network
    restart: unless-stopped
    profiles:
      - bolt

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ragdz-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - ragdz-network
    restart: unless-stopped

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ragdz-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - ragdz-network
    restart: unless-stopped

networks:
  ragdz-network:
    driver: bridge
    name: ragdz-network

volumes:
  postgres_data:
    name: ragdz-postgres-data
  redis_data:
    name: ragdz-redis-data
  qdrant_data:
    name: ragdz-qdrant-data
  backend_cache:
    name: ragdz-backend-cache
  prometheus_data:
    name: ragdz-prometheus-data
  grafana_data:
    name: ragdz-grafana-data
